repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-json
        exclude: ^(frontend/tsconfig.*\.json|.*/\.vscode/.*\.json)$
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check # linter
        args: [--fix]
        files: ^backend/
      - id: ruff-format # formatter
        files: ^backend/
  - repo: https://gitlab.com/bmares/check-json5
    rev: v1.0.1
    hooks:
      - id: check-json5
        files: ^(frontend/tsconfig.*\.json|.*/\.vscode/.*\.json)$
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: bash -c 'cd backend && uv run pyright'
        language: system
        files: ^backend/
        types: [python]
        pass_filenames: false
      - id: frontend-format
        name: frontend format
        entry: pnpm --dir frontend format
        language: system
        files: ^frontend/src/
        pass_filenames: false
      - id: frontend-lint
        name: frontend lint
        entry: pnpm --dir frontend lint
        language: system
        files: ^frontend/
        pass_filenames: false
      - id: frontend-type-check
        name: frontend type-check
        entry: pnpm --dir frontend type-check
        language: system
        files: ^frontend/
        pass_filenames: false
